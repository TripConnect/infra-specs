namespace: tripconnect
deploymentType: backend-service
image:
  namespace: ndtrongdev
  tag: latest
replicaCount: 1
pullPolicy: Always
runtime: ""
env: k8s-dev
consul:
  inject: true
  transparentProxy: true
service:
  type: ClusterIP
infra:
  namespace: infra
  endpoints:
    kafka:
      host: kafka.infra.svc.cluster.local
      port: 9092
    postgres:
      host: postgres.infra.svc.cluster.local
      port: 5432
    mongodb:
      host: mongodb.infra.svc.cluster.local
      port: 27017
observability:
  instrumentation:
    endpoint: http://otel-collector.observability.svc.cluster.local:4317
    protocol: grpc
    tracesExporter: otlp
    metricsExporter: none
    logsExporter: none
    propagators: tracecontext,baggage
    tracesSampler: parentbased_always_on
    resourceAttributes: {}
    nodejs:
      nodeOptions: "--require @opentelemetry/auto-instrumentations-node/register"
      resourceDetectors: env,host,os
      logLevel: none
      enabledInstrumentations: ""
      disabledInstrumentations: ""
