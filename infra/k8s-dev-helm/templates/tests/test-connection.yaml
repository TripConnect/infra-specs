apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "k8s-dev-helm.deployment-name" . }}-test-connection"
  labels:
    {{ include "k8s-dev-helm.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "k8s-dev-helm.deployment-name" . }}:{{ .Values.containerPort }}']
  restartPolicy: Never
