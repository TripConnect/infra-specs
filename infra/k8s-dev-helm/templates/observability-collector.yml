{{- if eq .Values.deploymentType "observability" }}
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: {{ include "k8s-dev-helm.namespace" . }}
  name: {{ .Values.observability.collector.name }}-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      {{- if .Values.observability.collector.memoryLimiter }}
      memory_limiter:
        check_interval: {{ .Values.observability.collector.memoryLimiter.checkInterval }}
        limit_mib: {{ .Values.observability.collector.memoryLimiter.limitMib }}
        spike_limit_mib: {{ .Values.observability.collector.memoryLimiter.spikeLimitMib }}
      {{- end }}
      batch: {}

    exporters:
      otlp/jaeger:
        endpoint: {{ .Values.observability.collector.exporters.jaeger.endpoint }}
        tls:
          insecure: {{ .Values.observability.collector.exporters.jaeger.tls.insecure }}
      {{- if .Values.observability.collector.exporters.debug }}
      debug:
        verbosity: {{ .Values.observability.collector.exporters.debug.verbosity }}
      {{- end }}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [{{- if .Values.observability.collector.memoryLimiter }}memory_limiter, {{- end }}batch]
          exporters: [otlp/jaeger{{- if .Values.observability.collector.exporters.debug }}, debug{{- end }}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ include "k8s-dev-helm.namespace" . }}
  name: {{ .Values.observability.collector.name }}
  labels:
    app: {{ .Values.observability.collector.name }}
spec:
  replicas: {{ .Values.observability.collector.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.observability.collector.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.observability.collector.name }}
      annotations:
        consul.hashicorp.com/connect-inject: "false"
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.observability.collector.image.repository }}:{{ .Values.observability.collector.image.tag }}"
          imagePullPolicy: {{ .Values.observability.collector.image.pullPolicy }}
          args:
            - --config=/etc/otelcol/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otelcol
              readOnly: true
          resources:
            {{- toYaml .Values.observability.collector.resources | nindent 12 }}
      volumes:
        - name: otel-collector-config
          configMap:
            name: {{ .Values.observability.collector.name }}-config
---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ include "k8s-dev-helm.namespace" . }}
  name: {{ .Values.observability.collector.name }}
spec:
  type: {{ .Values.observability.collector.service.type }}
  selector:
    app: {{ .Values.observability.collector.name }}
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
{{- end }}
