apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: tripconnect
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "user-service"
    spec:
      containers:
        - name: user-service
          image: user-service:latest
          imagePullPolicy: Never # Keep as 'Always' for registry
          ports:
            - containerPort: 31072
