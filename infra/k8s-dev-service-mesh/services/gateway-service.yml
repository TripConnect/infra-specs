apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: tripconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
      annotations:
        consul.hashicorp.com/connect-inject: "true"
    spec:
      containers:
        - name: gateway-service
          image: gateway-service:latest
          imagePullPolicy: Never # Keep as 'Always' for registry
          ports:
            - containerPort: 31071
